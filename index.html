<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#181d4e" />

    <title>Vyra Health — Weight loss, reviewed by clinicians</title>
    <meta
      name="description"
      content="Clinician-reviewed GLP-1 weight loss treatments — same active ingredients as the brand names, at a fair price. (Practice clone project, not a real clinic.)"
    />
    <!-- NOTE: replace %VITE_SITE_URL% with the production origin. -->
    <link rel="canonical" href="%VITE_SITE_URL%/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vyra Health" />
    <meta property="og:title" content="Vyra Health — Weight loss, reviewed by clinicians" />
    <meta
      property="og:description"
      content="Clinician-reviewed GLP-1 weight loss treatments — same active ingredients as the brand names, at a fair price."
    />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/images/hero2.webp" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vyra Health — Weight loss, reviewed by clinicians" />
    <meta
      name="twitter:description"
      content="Clinician-reviewed GLP-1 weight loss treatments — same active ingredients as the brand names, at a fair price."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/images/hero2.webp" />

    <!-- Fonts: preconnect + swap so text renders immediately with a fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500;1,9..144,600&family=Inter:wght@200;300;400;500;600;700&family=Red+Hat+Text:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- The hero <img> only exists once the JS bundle has parsed, so the
         preload scanner never sees it and the LCP fetch starts late. This
         preload starts it during HTML parse instead. SmartImage's `priority`
         (eager + fetchpriority=high) still applies at the element level.
         Cost on non-home routes is one unused 224KB image; worth it for LCP. -->
    <link
      rel="preload"
      as="image"
      href="/images/hero2.webp"
      type="image/webp"
      fetchpriority="high"
    />

    <!-- Organization + WebSite structured data (site-wide, static) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "%VITE_SITE_URL%/#organization",
            "name": "Vyra Health",
            "url": "%VITE_SITE_URL%/",
            "logo": "%VITE_SITE_URL%/favicon.svg",
            "description": "Clinician-reviewed GLP-1 weight loss treatments."
          },
          {
            "@type": "WebSite",
            "@id": "%VITE_SITE_URL%/#website",
            "url": "%VITE_SITE_URL%/",
            "name": "Vyra Health",
            "publisher": { "@id": "%VITE_SITE_URL%/#organization" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
