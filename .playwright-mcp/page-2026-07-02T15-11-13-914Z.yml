          - heading "Product information" [level=4] [ref=f2e46]
          - paragraph [ref=f2e47]: Vyra Health supplies pharmaceutical-grade peptide compounds prepared at licensed compounding facilities. Every batch is purity-tested (≥99%) and a certificate of analysis is available on request. These are compounded preparations — not branded, FDA-approved medicines.
          - paragraph [ref=f2e48]: Vials are supplied as lyophilised (freeze-dried) powder and require reconstitution before use. Full instructions and dosing guidance are included with every order. Specifications are shared for informational purposes only.
        - generic [ref=f2e49]:
